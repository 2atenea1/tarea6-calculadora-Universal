<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Universal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora-card" id="main-card">
        <h1>Calculadora Multi-Motor</h1>
        
        <div class="selector-container">
            <label>Selecciona el Backend:</label>
            <select id="motor" onchange="actualizarInterfaz()">
                <option value="java">Java (Spring Boot)</option>
                <option value="express">Node.js (Express)</option>
                <option value="fastapi">Python (FastAPI)</option>
                <option value="php">PHP</option>
                <option value="agnostico"> Agnóstico </option>
            </select>
        </div>

        <div class="inputs-principales">
            <input type="number" id="numA" value="0">
            <input type="number" id="numB" value="0">
        </div>

        <div class="operaciones-container">
            <div class="fila-op">
                <span>SUMA</span>
                <div class="botones">
                    <button class="btn path" onclick="ejecutar('PATH', 'suma')">Path</button>
                    <button class="btn query" onclick="ejecutar('QUERY', 'suma')">Query</button>
                    <button class="btn body" onclick="ejecutar('BODY', 'suma')">Body</button>
                </div>
            </div>
            <div class="fila-op">
                <span>RESTA</span>
                <div class="botones">
                    <button class="btn path" onclick="ejecutar('PATH', 'resta')">Path</button>
                    <button class="btn query" onclick="ejecutar('QUERY', 'resta')">Query</button>
                    <button class="btn body" onclick="ejecutar('BODY', 'resta')">Body</button>
                </div>
            </div>
            <div class="fila-op">
                <span>MULTIPLICACIÓN</span>
                <div class="botones">
                    <button class="btn path" onclick="ejecutar('PATH', 'multiplicacion')">Path</button>
                    <button class="btn query" onclick="ejecutar('QUERY', 'multiplicacion')">Query</button>
                    <button class="btn body" onclick="ejecutar('BODY', 'multiplicacion')">Body</button>
                </div>
            </div>
            <div class="fila-op">
                <span>DIVISIÓN</span>
                <div class="botones">
                    <button class="btn path" onclick="ejecutar('PATH', 'division')">Path</button>
                    <button class="btn query" onclick="ejecutar('QUERY', 'division')">Query</button>
                    <button class="btn body" onclick="ejecutar('BODY', 'division')">Body</button>
                </div>
            </div>
        </div>

        <div class="pantalla-resultado" id="display">
            Esperando operación...
        </div>
        <div id="status-url" style="font-size: 9px; color: #888; margin-top: 10px; word-break: break-all;"></div>
    </div>

    <script src="funcionalidad.js"></script>
</body>
</html>
